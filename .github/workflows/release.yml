name: Build Foundry Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Check module version
        shell: bash
        run: |
          MODULE_VERSION=$(node -p "require('./module.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "module.json version: $MODULE_VERSION"
          echo "Git tag version: $TAG_VERSION"

          if [ "$MODULE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: module.json version must match the Git tag."
            exit 1
          fi

      - name: Prepare module files
        shell: bash
        run: |
          mkdir -p dist

          rsync -av ./ dist/ \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="dist" \
            --exclude="desperate-measures.zip"

      - name: Create module ZIP
        shell: bash
        run: |
          cd dist
          zip -r ../desperate-measures.zip .
          cd ..

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            echo "Uploading or replacing release files."

            gh release upload "${GITHUB_REF_NAME}" \
              desperate-measures.zip \
              module.json \
              --clobber
          else
            echo "Creating release ${GITHUB_REF_NAME}."

            gh release create "${GITHUB_REF_NAME}" \
              desperate-measures.zip \
              module.json \
              --title "Desperate Measures ${GITHUB_REF_NAME}" \
              --generate-notes
          fi