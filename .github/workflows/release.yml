name: Build Foundry Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Check module version
        shell: bash
        run: |
          MODULE_VERSION=$(node -p "require('./module.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "module.json version: ${MODULE_VERSION}"
          echo "Git tag version: ${TAG_VERSION}"

          if [ "${MODULE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: module.json version must match the Git tag."
            exit 1
          fi

      - name: Prepare module package
        shell: bash
        run: |
          rm -rf package
          mkdir -p package

          cp module.json package/module.json

          if [ -d scripts ]; then
            cp -r scripts package/scripts
          fi

          if [ -d styles ]; then
            cp -r styles package/styles
          fi

          if [ -d lang ]; then
            cp -r lang package/lang
          fi

          if [ -d templates ]; then
            cp -r templates package/templates
          fi

          if [ -d icons ]; then
            cp -r icons package/icons
          fi

          if [ -f README.md ]; then
            cp README.md package/README.md
          fi

          cd package
          zip -r ../desperate-measures.zip .
          cd ..

          echo "Created desperate-measures.zip"
          unzip -l desperate-measures.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desperate-measures.zip
            module.json
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
