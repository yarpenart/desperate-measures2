name: Build Foundry Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Check module version
        shell: bash
        run: |
          MODULE_VERSION=$(node -p "require('./module.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "module.json version: ${MODULE_VERSION}"
          echo "Git tag version: ${TAG_VERSION}"

          if [ "${MODULE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: module.json version must match the Git tag."
            exit 1
          fi

      - name: Prepare module files
        shell: bash
        run: |
          mkdir -p package

          cp module.json package/module.json

          if [ -d "scripts" ]; then
            cp -r scripts package/scripts
          fi

          if [ -d "styles" ]; then
            cp -r styles package/styles
          fi

          if [ -d "lang" ]; then
            cp -r lang package/lang
          fi

          if [ -d "templates" ]; then
            cp -r templates package/templates
          fi

          if [ -d "icons" ]; then
            cp -r icons package/icons
          fi

          if [ -f "README.md" ]; then
            cp README.md package/README.md
          fi

          echo "Files included in package:"
          find package -maxdepth 4 -type f

      - name: Create module ZIP
        shell: bash
        run: |
          cd package
          zip -r ../desperate-measures.zip .
          cd ..

- name: Create or update GitHub Release
  env:
    GH_TOKEN: ${{ github.token }}
  shell: bash
  run: |
    if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
      echo "Release ${GITHUB_REF_NAME} already exists. Deleting and recreating."
      gh release delete "${GITHUB_REF_NAME}" --yes
    fi
    
    echo "Creating release ${GITHUB_REF_NAME}."
    
    gh release create "${GITHUB_REF_NAME}" \
      desperate-measures.zip \
      module.json \
      --title "Desperate Measures ${GITHUB_REF_NAME}" \
      --generate-notes